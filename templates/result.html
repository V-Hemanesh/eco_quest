{% extends "base.html" %}

{% block content %}

<div class="card">
    <h2>🏆 Result</h2>

    <p>Score: {{ score }}/{{ total }}</p>

    {% if message %}
        <p>{{ message }}</p>
    {% endif %}

    <!-- XP Display -->
    <h3>+{{ xp_gain }} XP ⭐</h3>

    <!-- BUTTON LOGIC -->
    {% if not is_pass %}
        <a href="/quiz/{{ topic_id }}">
            <button>Retry 🔁</button>
        </a>

    {% elif "Completed" in message %}
        <p>🎉 Topic Completed!</p>

    {% else %}
        <a href="/quiz/{{ topic_id }}">
            <button>Next Level ➡️</button>
        </a>
    {% endif %}

</div>

{% endblock %}
