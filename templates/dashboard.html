{% extends "base.html" %}

{% block content %}

<h2>🎮 Game Hub</h2>

<div class="card">
    <h3>{{ user[0] }}</h3>
    <p>XP: {{ user[1] }}</p>
    <p>Level: {{ user[2] }}</p>
    <p>Stars: ⭐ {{ user[3] }}</p>

    <!-- PROGRESS BAR -->
    <div class="progress-container">
        <div class="progress-bar" style="width: {{ progress }}%"></div>
    </div>
</div>

{% endblock %}
