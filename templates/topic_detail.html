{% extends "base.html" %}

{% block content %}
<div class="animate-fade-in" style="max-width: 900px; margin: 0 auto;">

    <div style="margin-bottom: 20px;">
        <a href="{{ url_for('learning') }}" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.9rem;">
            <i class="fa-solid fa-arrow-left"></i> Back to Briefings
        </a>
    </div>

    <div class="card" style="border-top: 8px solid var(--primary); padding: 40px;">
        <div
            style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 20px;">
            <div style="font-size: 2.5rem; color: var(--primary);">
                <i class="fa-solid fa-book-open-reader"></i>
            </div>
            <h1 style="font-size: 2.2rem; color: var(--text-main); margin: 0;">{{ topic[1] }}</h1>
        </div>

        <div class="detailed-content" style="line-height: 1.8; color: var(--text-main); font-size: 1.1rem;">
            {{ topic[2] | safe }}
        </div>

        <div style="margin-top: 40px; padding-top: 30px; border-top: 1px solid rgba(0,0,0,0.05); text-align: center;">
            <p class="text-muted" style="margin-bottom: 15px; font-weight: 600;">Ready to test your knowledge?</p>
            <a href="{{ url_for('quiz', topic_id=topic[0]) }}" class="btn"
                style="font-size: 1.2rem; padding: 15px 40px;">
                Take Challenge <i class="fa-solid fa-rocket"></i>
            </a>
        </div>
    </div>

</div>

<style>
    /* Add some beautiful styling specifically for the rich text inside detailed-content */
    .detailed-content strong {
        color: var(--primary-dark);
        font-size: 1.2rem;
        display: inline-block;
        margin-top: 15px;
        margin-bottom: 5px;
    }

    .detailed-content ul {
        background: rgba(16, 185, 129, 0.03);
        padding: 20px 20px 20px 40px;
        border-radius: var(--radius-md);
        border: 1px solid rgba(16, 185, 129, 0.1);
    }

    .detailed-content li {
        margin-bottom: 10px;
    }

    .detailed-content li:last-child {
        margin-bottom: 0;
    }
</style>
{% endblock %}
