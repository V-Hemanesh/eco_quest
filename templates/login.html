<!DOCTYPE html>
<html>
<head>
<title>EcoQuest Login</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #66bb6a, #43a047);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 350px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    animation: fadeIn 0.8s ease-in;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

h2 {
    margin-bottom: 20px;
}

/* Inputs */
input {
    width: 90%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* Button */
button {
    width: 95%;
    padding: 10px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #1b5e20;
}

/* Toggle */
.toggle {
    margin-top: 10px;
    color: blue;
    cursor: pointer;
}

/* Messages */
.error { color: red; }
.success { color: green; }

.hidden {
    display: none;
}
</style>

</head>
<body>

<div class="container">

<h2 id="title">Login</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

{% if success %}
<p class="success">{{ success }}</p>
{% endif %}

<!-- LOGIN FORM -->
<form method="POST" id="loginForm">
    <input type="hidden" name="action" value="login">

    <input name="usn" placeholder="USN" required>
    <input name="password" type="password" placeholder="Password" required>

    <button>Login</button>
</form>

<!-- REGISTER FORM -->
<form method="POST" id="registerForm" class="hidden">
    <input type="hidden" name="action" value="register">

    <input name="name" placeholder="Name" required>
    <input name="usn" placeholder="USN" required>
    <input name="password" type="password" placeholder="Password" required>

    <button>Register</button>
</form>

<p class="toggle" onclick="toggleForms()">New user? Register</p>

</div>

<script>
function toggleForms() {
    let login = document.getElementById("loginForm");
    let register = document.getElementById("registerForm");
    let title = document.getElementById("title");
    let toggle = document.querySelector(".toggle");

    login.classList.toggle("hidden");
    register.classList.toggle("hidden");

    if (login.classList.contains("hidden")) {
        title.innerText = "Register";
        toggle.innerText = "Already have an account? Login";
    } else {
        title.innerText = "Login";
        toggle.innerText = "New user? Register";
    }
}
</script>

</body>
</html>
