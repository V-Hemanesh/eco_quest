{% extends "base.html" %}

{% block content %}
<div class="glass-panel" style="max-width: 400px; width: 100%; padding: 40px; text-align: center; position: relative;">
    
    <div style="margin-bottom: 30px;">
        <i class="fa-solid fa-leaf text-gradient" style="font-size: 3rem; margin-bottom: 15px; display: inline-block; animation: float 3s ease-in-out infinite;"></i>
        <h2 id="title" style="font-size: 2rem;">Welcome Back</h2>
        <p class="text-muted" id="subtitle" style="margin-top: 5px;">Login to continue your EcoQuest</p>
    </div>

    {% if error %}
    <div style="background: rgba(239, 68, 68, 0.1); color: var(--danger); padding: 12px; border-radius: var(--radius-sm); margin-bottom: 20px; border: 1px solid rgba(239, 68, 68, 0.2); font-weight: 600;">
        <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div style="background: rgba(16, 185, 129, 0.1); color: var(--primary-dark); padding: 12px; border-radius: var(--radius-sm); margin-bottom: 20px; border: 1px solid rgba(16, 185, 129, 0.2); font-weight: 600;">
        <i class="fa-solid fa-circle-check"></i> {{ success }}
    </div>
    {% endif %}

    <!-- LOGIN FORM -->
    <form method="POST" id="loginForm" class="animate-fade-in">
        <input type="hidden" name="action" value="login">

        <div class="form-group">
            <label>USN</label>
            <div style="position: relative;">
                <i class="fa-solid fa-id-card text-muted" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%);"></i>
                <input name="usn" class="form-control" placeholder="Enter your USN" style="padding-left: 45px;" required>
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div style="position: relative;">
                <i class="fa-solid fa-lock text-muted" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%);"></i>
                <input name="password" type="password" class="form-control" placeholder="Enter password" style="padding-left: 45px;" required>
            </div>
        </div>

        <button class="btn" style="width: 100%; margin-top: 10px; padding: 14px; font-size: 1.1rem;">
            Login <i class="fa-solid fa-arrow-right"></i>
        </button>
    </form>

    <!-- REGISTER FORM -->
    <form method="POST" id="registerForm" style="display: none;">
        <input type="hidden" name="action" value="register">

        <div class="form-group">
            <label>Full Name</label>
            <div style="position: relative;">
                <i class="fa-solid fa-user text-muted" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%);"></i>
                <input name="name" class="form-control" placeholder="Eco Warrior Name" style="padding-left: 45px;" required>
            </div>
        </div>

        <div class="form-group">
            <label>USN</label>
            <div style="position: relative;">
                <i class="fa-solid fa-id-card text-muted" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%);"></i>
                <input name="usn" class="form-control" placeholder="Enter your USN" style="padding-left: 45px;" required>
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div style="position: relative;">
                <i class="fa-solid fa-lock text-muted" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%);"></i>
                <input name="password" type="password" class="form-control" placeholder="Create a password" style="padding-left: 45px;" required>
            </div>
        </div>

        <button class="btn" style="width: 100%; margin-top: 10px; padding: 14px; font-size: 1.1rem;">
            Join the Quest <i class="fa-solid fa-user-plus"></i>
        </button>
    </form>

    <div style="margin-top: 25px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 20px;">
        <p class="text-muted">
            <span id="toggleText">New to EcoQuest?</span> 
            <a href="javascript:void(0)" onclick="toggleForms()" style="color: var(--primary); font-weight: 800; text-decoration: none;">
                <span id="toggleLink">Create an account</span>
            </a>
        </p>
    </div>
</div>

<script>
function toggleForms() {
    let login = document.getElementById("loginForm");
    let register = document.getElementById("registerForm");
    let title = document.getElementById("title");
    let subtitle = document.getElementById("subtitle");
    let toggleText = document.getElementById("toggleText");
    let toggleLink = document.getElementById("toggleLink");

    if (login.style.display === "none") {
        login.style.display = "block";
        login.classList.add("animate-fade-in");
        register.style.display = "none";
        title.innerText = "Welcome Back";
        subtitle.innerText = "Login to continue your EcoQuest";
        toggleText.innerText = "New to EcoQuest?";
        toggleLink.innerText = "Create an account";
    } else {
        login.style.display = "none";
        register.style.display = "block";
        register.classList.add("animate-fade-in");
        title.innerText = "Join the Movement";
        subtitle.innerText = "Start your journey to save the planet";
        toggleText.innerText = "Already a warrior?";
        toggleLink.innerText = "Login here";
    }
}
</script>
{% endblock %}
